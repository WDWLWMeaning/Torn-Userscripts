# GitLab CI/CD Pipeline to generate .meta.js files
# This creates metadata-only files for Tampermonkey update checking

stages:
  - build
  - deploy

generate-meta:
  stage: build
  image: alpine:latest
  before_script:
    - apk add --no-cache bash git
  script:
    - |
      echo "Generating .meta.js files for Tampermonkey scripts..."
      
      # Find all .user.js files in tampermonkey folder
      for user_script in tampermonkey/*.user.js; do
        if [ -f "$user_script" ]; then
          # Get the base name without .user.js
          base_name=$(basename "$user_script" .user.js)
          meta_file="tampermonkey/${base_name}.meta.js"
          
          echo "Processing: $user_script -> $meta_file"
          
          # Extract the metadata block (from ==UserScript== to ==/UserScript==)
          awk '
            /^\/\/ ==UserScript==$/ { printing = 1 }
            printing { print }
            /^\/\/ ==\/UserScript==$/ { printing = 0; exit }
          ' "$user_script" > "$meta_file"
          
          if [ -s "$meta_file" ]; then
            echo "  ✓ Created $meta_file"
          else
            echo "  ✗ Failed to extract metadata from $user_script"
            rm -f "$meta_file"
          fi
        fi
      done
      
      echo ""
      echo "Meta file generation complete!"
      ls -la tampermonkey/*.meta.js 2>/dev/null || echo "No .meta.js files generated"
  artifacts:
    paths:
      - tampermonkey/*.meta.js
    expire_in: 1 week
  only:
    - main

commit-meta:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git openssh-client
    - git config --global user.email "ci@git.er-ic.ca"
    - git config --global user.name "GitLab CI"
  script:
    - |
      echo "Committing generated meta files..."
      
      # Setup git to push back to repo
      git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      
      # Check if there are changes to commit
      if [ -n "$(git status --porcelain tampermonkey/*.meta.js 2>/dev/null)" ]; then
        git add tampermonkey/*.meta.js
        git commit -m "CI: Update meta files [skip ci]"
        git push origin HEAD:${CI_COMMIT_REF_NAME}
        echo "✓ Meta files committed and pushed"
      else
        echo "No changes to meta files"
      fi
  only:
    - main
  dependencies:
    - generate-meta
